name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  quality:
    name: Format, clippy and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format sources
        run: cargo fmt --all
      - name: Check formatting diff
        id: formatting
        run: git diff --exit-code
      - name: Upload rustfmt output
        if: failure() && steps.formatting.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-output
          path: |
            app/src
            crates
          if-no-files-found: error
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Tests
        id: tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --all-features 2>&1 | tee test.log
      - name: Upload test log
        if: failure() && steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: cargo-test-log
          path: test.log
          if-no-files-found: error
      - name: Upload resolved lockfile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-lock
          path: Cargo.lock
          if-no-files-found: error

  feature-matrix:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core-headless
            args: --no-default-features
          - name: sync-client
            args: --no-default-features --features sync-client
          - name: sync-server
            args: --no-default-features --features sync-server
          - name: desktop
            args: --no-default-features --features desktop
          - name: full
            args: --all-features
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: Check ${{ matrix.name }}
        run: cargo check -p loncher ${{ matrix.args }}
